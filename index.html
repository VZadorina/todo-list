<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Список покупок</h1>
        </header>
        <main>
            <div id="todo-form">
                <input id="todo-input" type="text" placeholder="что надо купить?">
                <div class="buttons">
                    <button id="add-btn" type="button">+ ДОБАВИТЬ</button>
                    <button id="clear-btn" type="button">ОЧИСТИТЬ</button>
                </div>
            </div>
            <ul id="todo-list">
                <!-- задачи будут добавляться через JS -->
            </ul>
        </main>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
